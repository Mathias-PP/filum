version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: filum-postgres-prod
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      PGDATA: /var/lib/postgresql/data
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
      - ./backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 30s
      timeout: 10s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "10"
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 2G
    profiles:
      - backup

  backup:
    image: postgres:16-alpine
    container_name: filum-backup-prod
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      BACKUP_PATH: /backups
    volumes:
      - ./backups:/backups
    entrypoint: ["/bin/sh", "-c"]
    command: |
      "while true; do
        pg_dump -h postgres -U $${POSTGRES_USER} -d $${POSTGRES_DB} > $${BACKUP_PATH}/backup_$$(date +%Y%m%d_%H%M%S).sql;
        sleep 86400;
      done"
    depends_on:
      - postgres

volumes:
  postgres_prod_data:
