<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        font-family: system-ui, sans-serif;
        font-size: 13px;
        padding: 12px;
        min-width: 320px;
      }
      label {
        display: block;
        font-weight: 600;
        margin: 8px 0 3px;
      }
      input {
        width: 100%;
        box-sizing: border-box;
        padding: 6px 8px;
        border: 1px solid #d6d3d1;
        border-radius: 5px;
      }
      button {
        margin-top: 12px;
        padding: 7px 14px;
        border: none;
        border-radius: 6px;
        background: #1c1917;
        color: #fff;
        font-weight: 600;
        cursor: pointer;
      }
      #status {
        margin-left: 8px;
        color: #065f46;
      }
      .hint {
        color: #78716c;
        font-size: 11px;
        margin-top: 2px;
      }
    </style>
  </head>
  <body>
    <label for="api-base">URL de l'API</label>
    <input id="api-base" type="url" />
    <div class="hint">Défaut : https://philum-api.duckdns.org</div>

    <label for="frontend-base">URL du site Philum</label>
    <input id="frontend-base" type="url" />
    <div class="hint">Défaut : https://filum-eight.vercel.app</div>

    <button id="save-btn" type="button">Enregistrer</button>
    <span id="status"></span>

    <script src="options.js"></script>
  </body>
</html>
