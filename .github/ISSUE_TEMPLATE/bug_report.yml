name: Bug Report
description: Create a report to help us improve
title: "[Bug] "
labels: ["bug", "triage"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        ## Description
        A clear and concise description of what the bug is.

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How to reproduce the issue
      placeholder: |
        1. Go to '...'
        2. Click on '....'
        3. See error

    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen

    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened

    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - Low
        - Medium
        - High
        - Critical
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Filum Version
      description: Version or commit hash

  - type: dropdown
    id: os
    attributes:
      label: OS
      options:
        - Linux
        - macOS
        - Windows
        - WSL

  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs
      description: Any error messages or stack traces
      render: shell

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other information about the problem
