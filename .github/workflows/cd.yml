name: CD

on:
  push:
    branches: [main]
    tags: ["v*"]

workflow_dispatch:
  inputs:
    environment:
      description: "Deployment environment"
      required: true
      default: "staging"
      type: choice
      options:
        - staging
        - production

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  PYTHON_VERSION: "3.12"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-backend:
    name: Build Backend Image
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.meta.outputs.tags }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{IsDefaultBranch}}

      - name: Build and push backend image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ./apps/backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-staging:
    name: Deploy to Staging
    needs: [build-backend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.event.inputs.environment == 'staging'
    environment:
      name: staging
      url: https://staging.filum.app
    steps:
      - name: Deploy to Railway
        uses: railway-devrel/railway-actions@v1
        with:
          token: ${{ secrets.RAILWAY_TOKEN }}
          service: filum-backend-staging
          image: ${{ needs.build-backend.outputs.image }}
          environment: staging
          variables: |
            DATABASE_URL=${{ secrets.STAGING_DATABASE_URL }}
            SESSION_SECRET=${{ secrets.STAGING_SESSION_SECRET }}
            MASTER_ENCRYPTION_KEY=${{ secrets.STAGING_MASTER_ENCRYPTION_KEY }}
            GOOGLE_CLIENT_ID=${{ secrets.STAGING_GOOGLE_CLIENT_ID }}
            GOOGLE_CLIENT_SECRET=${{ secrets.STAGING_GOOGLE_CLIENT_SECRET }}

  deploy-production:
    name: Deploy to Production
    needs: [build-backend]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.environment == 'production'
    environment:
      name: production
      url: https://filum.app
    steps:
      - name: Deploy to Railway
        uses: railway-devrel/railway-actions@v1
        with:
          token: ${{ secrets.RAILWAY_TOKEN }}
          service: filum-backend-production
          image: ${{ needs.build-backend.outputs.image }}
          environment: production
          variables: |
            DATABASE_URL=${{ secrets.PROD_DATABASE_URL }}
            SESSION_SECRET=${{ secrets.PROD_SESSION_SECRET }}
            MASTER_ENCRYPTION_KEY=${{ secrets.PROD_MASTER_ENCRYPTION_KEY }}
            GOOGLE_CLIENT_ID=${{ secrets.PROD_GOOGLE_CLIENT_ID }}
            GOOGLE_CLIENT_SECRET=${{ secrets.PROD_GOOGLE_CLIENT_SECRET }}
