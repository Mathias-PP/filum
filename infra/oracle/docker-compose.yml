services:
  postgres:
    image: postgres:16-alpine
    container_name: philum-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 10s
      timeout: 5s
      retries: 10
    logging:
      driver: 'json-file'
      options:
        max-size: '20m'
        max-file: '5'

  backend:
    build: ../../apps/backend
    container_name: philum-backend
    restart: always
    env_file: .env
    environment:
      database_url: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - '8000'
    logging:
      driver: 'json-file'
      options:
        max-size: '20m'
        max-file: '5'

  caddy:
    image: caddy:2-alpine
    container_name: philum-caddy
    restart: always
    ports:
      - '80:80'
      - '443:443'
    environment:
      API_DOMAIN: ${API_DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend

  backup:
    image: postgres:16-alpine
    container_name: philum-backup
    restart: always
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./backups:/backups
    entrypoint: ['/bin/sh', '-c']
    # Dump quotidien, rotation 14 jours.
    command: |
      "while true; do
        pg_dump -h postgres -U ${POSTGRES_USER} -d ${POSTGRES_DB} | gzip > /backups/philum_$$(date +%Y%m%d_%H%M%S).sql.gz;
        find /backups -name 'philum_*.sql.gz' -mtime +14 -delete;
        sleep 86400;
      done"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
