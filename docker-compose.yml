version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: filum-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: filum
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-filum_dev_password}
      POSTGRES_DB: filum_dev
      PGDATA: /var/lib/postgresql/data
    ports:
      # 127.0.0.1 : ne jamais exposer Postgres sur le réseau local/public.
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./apps/backend/alembic/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U filum"]
      interval: 5s
      timeout: 5s
      retries: 5

  duckdb:
    image: duckdb/duckdb:latest
    container_name: filum-duckdb
    restart: unless-stopped
    stdin: true
    tty: true
    volumes:
      - duckdb_data:/var/lib/duckdb
      - ./apps/analytics:/analytics
    command: /analytics

volumes:
  postgres_data:
  duckdb_data:
