name: Security Scan
run-name: Security Scan

on:
  push:
    branches: [main, develop]
  pull_request:

permissions:
  contents: read

jobs:
  bandit:
    name: Security Static Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Run Bandit
        run: uv run bandit -r apps/backend/app/

  safety:
    name: Vulnerability Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Run Safety
        run: uv run safety check --json --output vulnerabilities.json || true

      - name: Upload results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-vulnerabilities
          path: vulnerabilities.json
